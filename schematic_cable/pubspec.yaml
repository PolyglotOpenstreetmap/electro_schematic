name: schematic_cable
description: >-
  Generic Flutter cable rendering — twisted-pair / power / multicore cable
  cross-sections and cable-to-terminal breakout schematics. Domain-agnostic;
  build cables from WireSpec/CableSpec or the provided factories.
version: 0.1.0
publish_to: none

homepage: https://github.com/PolyglotOpenstreetmap/electro_schematic
repository: https://github.com/PolyglotOpenstreetmap/electro_schematic/tree/master/schematic_cable
issue_tracker: https://github.com/PolyglotOpenstreetmap/electro_schematic/issues
topics:
  - flutter
  - schematic
  - cable
  - electrical
  - canvas

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  collection: ^1.18.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
