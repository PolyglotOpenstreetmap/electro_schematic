name: schematic_designer
description: >-
  Graphical editor for authoring DeviceDefinitions, with undo/redo, node
  palette, properties panel, and JSON import/export.
version: 0.1.0
publish_to: none

homepage: https://github.com/PolyglotOpenstreetmap/electro_schematic
repository: https://github.com/PolyglotOpenstreetmap/electro_schematic/tree/master/schematic_designer
issue_tracker: https://github.com/PolyglotOpenstreetmap/electro_schematic/issues
topics:
  - flutter
  - schematic
  - editor
  - diagram
  - canvas

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter
  schematic_device:
    path: ../schematic_device

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
